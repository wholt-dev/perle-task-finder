  { keywords: ["54-year-old elective lumbar discharge","lumbar spine procedure reviewed surgery"], answer: "Lumbar spine procedure reviewed" },
  { keywords: ["46-year-old female rheumatoid arthritis","labs within acceptable limits 46 progress"], answer: "Labs within acceptable limits" },
  { keywords: ["ct head 81-year-old female left stroke","acute left hemispheric mri diffusion"], answer: "acute left hemispheric stroke" },
  { keywords: ["8-month-old male fever 2 days parents","amoxicillin 400mg 45mg/kg bilateral otitis tms"], answer: "Amoxicillin 400mg (45mg/kg/day divided BID)" },
  { keywords: ["right inguinal hernia repair left canal","mesh oblique incision inguinal left"], answer: "left inguinal canal" },
  { keywords: ["58-year-old diabetes a1c 7.6 hypertension","goal 148/92 annual exam ldl creatinine"], answer: "Hypertension at goal" },
  { keywords: ["60-year-old pancreatitis gallstones alcohol","resume normal diet moderation discharge"], answer: "resume normal diet including alcohol in moderation once feeling better" },
  { keywords: ["40-year-old worst headache negative ct","subarachnoid ruled out kernig thunderclap"], answer: "Subarachnoid hemorrhage ruled out by negative CT" },
  { keywords: ["34-year-old motorcycle splenic icu","non-operative observation hemoglobin 7.2"], answer: "admit to surgical ICU for observation and non-operative management" },
  { keywords: ["colonoscopy 50-year-old screening guidelines","repeat 10 years polyp boston prep"], answer: "Recommend repeat colonoscopy in 10 years per guidelines" },
  { keywords: ["25-year-old female progressive admit floor","admission 25 floor symptoms"], answer: "Admit to floor" },
  { keywords: ["45-year-old ed flank groin","trimethoprim sulfamethoxazole ds bid flank"], answer: "trimethoprim-sulfamethoxazole DS BID" }
];

document.getElementById('totalCount').textContent = qaDatabase.length;

let searchCount = 0, copyCount = 0, currentAnswer = '';

function tokenize(text) {
  return text.toLowerCase().replace(/[^a-z0-9\s\.\/]/g, ' ').split(/\s+/).filter(w => w.length > 2);
}

function findAnswer() {
  const input = document.getElementById('questionInput').value.trim();
  if (!input) return;

  searchCount++;
  document.getElementById('searchCount').textContent = searchCount;

  const inputLower = input.toLowerCase();
  const inputTokens = tokenize(input);

  let bestMatch = null;
  let bestScore = 0;

  for (const qa of qaDatabase) {
    let score = 0;
    for (const kw of qa.keywords) {
      const kwLower = kw.toLowerCase();
      if (inputLower.includes(kwLower)) {
        score += 3;
      } else {
        const kwTokens = tokenize(kw);
        const matched = kwTokens.filter(t => inputTokens.some(it => it === t || it.includes(t) || t.includes(it)));
        if (matched.length > 0) score += matched.length / kwTokens.length;
      }
    }
    if (score > bestScore) { bestScore = score; bestMatch = qa; }
  }

  const resultBox = document.getElementById('resultBox');
  const noResult = document.getElementById('noResult');

  if (bestMatch && bestScore >= 0.5) {
    currentAnswer = bestMatch.answer;
    document.getElementById('resultAnswer').innerHTML = `<span class="highlight">${bestMatch.answer}</span>`;
    const maxPossible = bestMatch.keywords.length * 3;
    const pct = Math.min(100, Math.round((bestScore / maxPossible) * 100));
    document.getElementById('matchType').textContent = pct >= 60 ? 'EXACT MATCH' : pct >= 30 ? 'STRONG MATCH' : 'BEST MATCH';
    resultBox.classList.add('show');
    noResult.classList.remove('show');
    resultBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  } else {
    resultBox.classList.remove('show');
    noResult.classList.add('show');
    currentAnswer = '';
  }
}

function copyAnswer() {
  if (!currentAnswer) return;
  navigator.clipboard.writeText(currentAnswer).then(() => {
    copyCount++;
    document.getElementById('copyCount').textContent = copyCount;
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✅ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 Copy Answer'; btn.classList.remove('copied'); }, 2000);
  });
}

function clearAll() {
  document.getElementById('questionInput').value = '';
  document.getElementById('resultBox').classList.remove('show');
  document.getElementById('noResult').classList.remove('show');
  currentAnswer = '';
}

document.getElementById('questionInput').addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') findAnswer();
});
</script>
